<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Not Found</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e5e5e5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; max-width: 500px; padding: 40px; }
    .logo { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 72px; font-weight: 700; color: #f97316; margin-bottom: 16px; }
    h2 { font-size: 24px; color: #fff; margin-bottom: 12px; }
    p { color: #737373; margin-bottom: 24px; line-height: 1.6; }
    a { color: #f97316; text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
    .info { background: #171717; border: 1px solid #262626; border-radius: 12px; padding: 16px; margin-top: 24px; font-size: 12px; color: #737373; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">☁️</div>
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/">← Go to Dashboard</a>
    <div class="info">
      Cloudflare Router • Reverse Proxy Manager
    </div>
  </div>
</body>
</html>
