version: '3.8'

services:
  cloudflare-router:
    build: .
    container_name: cloudflare-router
    restart: unless-stopped
    ports:
      - "7070:7070"
    volumes:
      - ~/.cloudflare-router:/root/.cloudflare-router
    environment:
      - NODE_ENV=production
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-123456}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7070/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: cf-router-nginx
    restart: unless-stopped
    ports:
      - "6969:6969"
    volumes:
      - ~/.cloudflare-router/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ~/.cloudflare-router/nginx/sites:/etc/nginx/conf.d:ro
    depends_on:
      - cloudflare-router
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6969"]
      interval: 30s
      timeout: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cf-router-tunnel
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ~/.cloudflared:/etc/cloudflared:ro
    depends_on:
      - nginx
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "info"]
      interval: 60s
      timeout: 10s
      retries: 3
