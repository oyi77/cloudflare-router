# CF-Router App Registry
# ======================
# Defines all applications and their routing configuration.
# Supports three modes: port, socket, portless
#
# Usage:
#   - port:     Traditional port-based routing
#   - socket:   Unix socket-based routing (no port conflicts)
#   - portless: Auto-assigned port via portless
#
# After editing, run: cf-router reload

apps:
  # === PORT MODE ===
  # Traditional: app listens on a specific port
  mt5-router:
    mode: port
    hostname: mt-oc.aitradepulse.com
    host: 127.0.0.1
    port: 8080
    health_check: /api/health
    enabled: true

  saas:
    mode: port
    hostname: saas.aitradepulse.com
    host: 127.0.0.1
    port: 3000
    health_check: /
    enabled: true

  ai:
    mode: port
    hostname: ai.aitradepulse.com
    host: 127.0.0.1
    port: 20128
    health_check: /health
    enabled: true

  cc:
    mode: port
    hostname: cc.aitradepulse.com
    host: 127.0.0.1
    port: 19527
    health_check: /
    enabled: true

  cc2:
    mode: port
    hostname: cc2.aitradepulse.com
    host: 127.0.0.1
    port: 1420
    health_check: /
    enabled: true

  gateway:
    mode: port
    hostname: gateway.aitradepulse.com
    host: 127.0.0.1
    port: 18789
    health_check: /health
    enabled: true
    no_tls_verify: true

  paperclip:
    mode: port
    hostname: paperclip.aitradepulse.com
    host: 127.0.0.1
    port: 3100
    health_check: /
    enabled: true

  phonefarm:
    mode: port
    hostname: phonefarm.aitradepulse.com
    host: 127.0.0.1
    port: 8889
    health_check: /
    enabled: true

  # === SOCKET MODE ===
  # Unix socket: app creates a socket file, no port needed
  # To use: start your app with the socket
  # Example: uvicorn app.main:app --factory --unix-socket /tmp/myapp.sock
  
  # Example socket app (commented out - uncomment when needed)
  # my-socket-app:
  #   mode: socket
  #   hostname: myapp.aitradepulse.com
  #   path: /tmp/myapp.sock
  #   health_check: /
  #   enabled: true

  # === PORTLESS MODE ===
  # Auto-assigned port via portless
  # The app runs with: portless run <app-name> <command>
  # cf-router will auto-discover and route
  
  # Example portless app (uncomment when needed)
  # my-portless-app:
  #   mode: portless
  #   hostname: myapp-dev.aitradepulse.com
  #   health_check: /
  #   enabled: true
